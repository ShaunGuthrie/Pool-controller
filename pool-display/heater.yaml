number:
  - platform: lvgl
    widget: thermostat_setpoint
    id: heater_set_num
    restore_value: true
    trigger: on_release
    unit_of_measurement: "°F"
    on_value:
      then:
        - logger.log:
            format: "Heater setpoint changed to %.0f"
            args: ["x"]
        - climate.control:
            id: pool_heater
            target_temperature: !lambda |-
              return (x - 32.0) * 5.0 / 9.0;

script:
  - id: heat_valve_close
    mode: restart
    then:
      - delay: 30s
      - switch.turn_off: heater_valve


sensor:

  # A0 - Water In

  - platform: ads1115
    ads1115_id: ads2
    multiplexer: A0_GND
    gain: 4.096
    id: temp_in_adc
    update_interval: never

  - platform: resistance
    id: temp_in_resistance
    sensor: temp_in_adc
    configuration: UPSTREAM
    resistor: 10kOhm

  - platform: ntc
    name: "Temp In"
    id: temp_in
    sensor: temp_in_resistance
    calibration:
      b_constant: 3950
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    filters:
    - offset: -1.7
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(boot_complete);'
            then:
              - lvgl.label.update:
                  id: head_lbl_water_temp
                  text: !lambda |-
                    char buf[16];
                    float f = x * 9.0 / 5.0 + 32.0;
                    snprintf(buf, sizeof(buf), "Water %.0f°F", f);
                    return std::string(buf);

              - lvgl.indicator.update:
                  id: temperature_needle
                  value: !lambda |-
                    return (int)(x * 9.0 / 5.0 + 32.0);

  # A1 - Water Out

  - platform: ads1115
    ads1115_id: ads2
    multiplexer: A1_GND
    gain: 4.096
    id: temp_out_adc
    update_interval: never

  - platform: resistance
    id: temp_out_resistance
    sensor: temp_out_adc
    configuration: UPSTREAM
    resistor: 10kOhm

  - platform: ntc
    name: "Temp Out"
    id: temp_out
    sensor: temp_out_resistance
    calibration:
      b_constant: 3950
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    filters:
    - offset: -1.7      
    on_value:
      then:
        - if:
            condition:
              lambda: |-
                return id(boot_complete);
            then:
              - component.update: d_heat_rise  

  # A2 - Ambient

  - platform: ads1115
    ads1115_id: ads2
    multiplexer: A2_GND
    gain: 4.096
    id: ambient_adc
    update_interval: never

  - platform: resistance
    id: ambient_resistance
    sensor: ambient_adc
    configuration: UPSTREAM
    resistor: 10kOhm

  - platform: ntc
    name: "Temp Ambient"
    id: ambient
    sensor: ambient_resistance
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    filters:
      - offset: -4.4
      - lambda: return x * 9.0 / 5.0 + 32.0;    
    calibration:
      b_constant: 3950
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(boot_complete);'
            then:
              - lvgl.label.update:
                  id: head_lbl_a_temp
                  text: !lambda |-
                    char buf[32];
                    snprintf(buf, sizeof(buf), "Ambient: %.0f°F", id(ambient).state);
                    return std::string(buf);


  - platform: template
    id: d_heat_rise
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    lambda: |-
      return id(temp_out).state - id(temp_in).state;
    update_interval: never
    on_value:
      then:
        - lvgl.label.update:
            id: heat_lbl_rise
            text: !lambda |-
              float rise_c = id(temp_out).state - id(temp_in).state;
              float rise_f = rise_c * 9.0 / 5.0;

              char buf[32];
              snprintf(buf, sizeof(buf), "%.0f°F rise", rise_f);
              return std::string(buf); 

      

switch:
  - platform: gpio
    pin: 
      xl9535: relays
      number: 0
      mode:
        output: true
      inverted: false 
    id: heater_relay
    restore_mode: always_off 
  - platform: gpio
    pin: 
      xl9535: relays
      number: 16
      mode:
        output: true
      inverted: false 
    id: heater_valve
    restore_mode: restore_default_off

climate:
  - platform: thermostat
    visual:
      min_temperature: 70 °F
      max_temperature: 100 °F
      temperature_step: 1 °F
    name: "Thermostat"
    id: pool_heater
    default_preset: start
    on_boot_restore_from: DEFAULT_PRESET
    heat_deadband: 2 °F
    preset:
      - name: start
        default_target_temperature_low: 88 °F
        mode: "Off"
    sensor: temp_in
    min_heating_off_time: 30s
    min_heating_run_time: 30s
    min_idle_time: 30s
    
    on_state:
      then:
        - if:
            condition:
              lambda: |-
                return id(boot_complete);
            then:

              # -------------------------
              # MODE = HEAT
              # -------------------------
              - if:
                  condition:
                    lambda: 'return id(pool_heater).mode == CLIMATE_MODE_HEAT;'
                  then:

                    # STATUS TEXT
                    - if:
                        condition:
                          lambda: 'return id(heater_run) == "Idle";'
                        then:
                          - lvgl.label.update:
                              id: heat_lbl_status
                              text: "Idle"
                          - lvgl.label.update:
                              id: heat_btn_lbl_status
                              text: "\U000F0238"
                              text_color: 0xFFFFFF
                        else:
                          - lvgl.label.update:
                              id: heat_lbl_status
                              text: "Running"
                          - lvgl.label.update:
                              id: heat_btn_lbl_status
                              text: "\U000F0238"
                              text_color: 0xFFB300

                  else:

                    # OFF STATE
                    - lvgl.label.update:
                        id: heat_lbl_status
                        text: "Off"
                    - lvgl.label.update:
                        id: heat_btn_lbl_status
                        text: "\U000F1722"
                        text_color: 0xFFFFFF

              # -------------------------
              # ARC + SETPOINT LABEL
              # -------------------------

              - lvgl.arc.update:
                  id: thermostat_setpoint
                  value: !lambda |-
                    return (int) round(id(pool_heater).target_temperature * 9.0 / 5.0 + 32.0);

              - lvgl.label.update:
                  id: heat_lbl_setpoint
                  text: !lambda |-
                    char buf[16];
                    snprintf(buf, sizeof(buf), "%.0f°F",
                             id(pool_heater).target_temperature * 9.0 / 5.0 + 32.0);
                    return std::string(buf);

      
    heat_mode:
      - switch.turn_on: heater_valve

    off_mode:  
      - switch.turn_off: heater_valve
      - lambda: |-
          // Restore pump to previously scheduled state
          if (id(Prev_Pump_Status) == "Low") {
          id(b_low).press();
          } else if (id(Prev_Pump_Status) == "High") {
          id(b_high).press();
          } else if (id(Prev_Pump_Status) == "Off") {
          id(b_off).press();
          }
          ESP_LOGI("heater", "Idle - Pump restored to scheduled state: %s", id(Prev_Pump_Status).c_str());


    heat_action:
      - lambda: |-
          // Remember current pump state before forcing High
          id(Prev_Pump_Status) = id(Pump_Status);
      - globals.set:
          id: heater_run
          value: '"Heat"'
      - globals.set:
          id: Pump_Status
          value: '"High"'
      # Drive the switch directly (not button.press: b_high) - b_high's own
      # on_press handler overwrites Prev_Pump_Status, which would clobber the
      # value just saved above. LVGL highlight still updates via speed_high's
      # on_turn_on.
      - switch.turn_on: speed_high
      - switch.turn_on: heater_relay
    idle_action:
      - globals.set:
          id: heater_run
          value: '"Idle"'           
      - switch.turn_off: heater_relay          # turn off heater relay

      

