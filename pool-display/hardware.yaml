uart:
  id: uart_bus
  tx_pin: GPIO27
  rx_pin: GPIO26
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 256     



i2c:
  sda: GPIO07
  scl: GPIO08
  frequency: 400khz
  timeout: 10ms

    
ads1115:
  - address: 0x48
    id: ads0
    continuous_mode: false
  - address: 0x49
    id: ads1
    continuous_mode: false
  - address: 0x4A
    id: ads2
    continuous_mode: false  



 
xl9535:
  - id: relays
    address: 0x20  

display:
  - platform: mipi_dsi
    id: main_display
    model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B
    reset_pin:
      number: 33
    update_interval: never
    auto_clear_enabled: false
   
    dimensions:
      width: 1024
      height: 600


touchscreen:
  - platform: gt911
    id: touch
    reset_pin: GPIO23
    update_interval: 50ms
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: true
    on_touch:
      then:
        - light.turn_on:
            id: backlight
        - script.execute: 
            id: backlight_off_timer
        - logger.log: "TOUCH DETECTED"    

# --- Backlight ---
output:
  - platform: ledc
    pin: 
      number: GPIO32
      inverted: true
    id: backlight_pwm
    frequency: 5000 Hz
    

light:
  - platform: monochromatic
    output: backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

script:
  - id: backlight_off_timer
    mode: restart
    then:
      - delay: 120s
      - light.turn_off: 
          id: backlight

time:
  - platform: homeassistant
    id: pool_time