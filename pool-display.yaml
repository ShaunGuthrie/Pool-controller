esphome:
  name: "pool-display"
  friendly_name: Pool Display
  platformio_options:
    build_dir: "C:\\esphome_build\\pool-display"
    build_path: "C:\\esphome_build\\pool-display"
    build_unflags:
      - "-DLVGL_USE_VG_LITE"
    build_flags:
      - "-DLVGL_USE_VG_LITE=0"
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            id(reboot_count)++;
    - priority: -100
      then:
        - delay: 2s
        - lambda: |-
            id(boot_complete) = true;
        - lvgl.label.update:
            id: head_lbl_build
            text: !lambda |-
              return std::string("Build: ") + __DATE__ + " " + __TIME__;    
    - priority: -100
      then:
        - wait_until:
            api.connected:
        - component.update: ha_pump_status
        - lambda: |-
            esp_reset_reason_t reason = esp_reset_reason();
            switch(reason) {
              case ESP_RST_POWERON:   ESP_LOGI("boot", "Reset: Power on"); break;
              case ESP_RST_BROWNOUT:  ESP_LOGE("boot", "Reset: BROWNOUT"); break;
              case ESP_RST_WDT:       ESP_LOGE("boot", "Reset: Watchdog"); break;
              case ESP_RST_PANIC:     ESP_LOGE("boot", "Reset: Panic/crash"); break;
              case ESP_RST_SW:        ESP_LOGI("boot", "Reset: Software"); break;
              case ESP_RST_DEEPSLEEP: ESP_LOGI("boot", "Reset: Deep sleep"); break;
              default:                ESP_LOGW("boot", "Reset: Unknown (%d)", reason); break;
            }  
            ESP_LOGI("boot", "Last ethernet event: %s", id(last_eth_event).c_str());        
   
  
esp32:
  variant: esp32p4
  engineering_sample: true
  framework:
    type: esp-idf
    version: 5.4.2
    advanced:
      enable_idf_experimental_features: true
  flash_size: 32MB
  cpu_frequency: 360MHz
  partitions: partitions.csv

ethernet:
  type: W5500
  mosi_pin: GPIO4
  miso_pin: GPIO5
  clk_pin: GPIO2
  cs_pin: GPIO3
  interrupt_pin: GPIO28
  reset_pin: GPIO29
  clock_speed: 20MHz
  on_disconnect:
    - lambda: id(last_eth_event) = "disconnected";
  on_connect:
    - lambda: id(last_eth_event) = "connected";


udp:
  addresses:
    - 192.168.13.6

psram:
  mode: hex
  speed: 200MHz

preferences:
  flash_write_interval: 5min

esp_ldo:
  - voltage: 2.5V
    channel: 3

safe_mode:
  num_attempts: 3
  reboot_timeout: 60s
  boot_is_good_after: 30s

logger:
  level: VERBOSE
  initial_level: INFO

debug:

ota:
  platform: esphome

api:
  reboot_timeout: 2min
  
web_server:
  port: 80

http_request:
  useragent: esphome/cyd
  timeout: 10s
  verify_ssl: False





packages:

  globals: !include pool-display/globals.yaml
  heater: !include pool-display/heater.yaml
  hardware: !include pool-display/hardware.yaml
  chemistry: !include pool-display/chemistry.yaml
  pump: !include pool-display/pump.yaml
  acid_dose: !include pool-display/acid_dose.yaml
  chlorinator: !include pool-display/chlorinator.yaml
  schedule: !include pool-display/schedule.yaml
  interfaces: !include pool-display/interface/interface_config.yaml
  fonts: !include pool-display/interface/fontscolors.yaml
  lvgl: !include pool-display/interface/lvgl_7_wave.yaml
  style: !include pool-display/interface/themes_styles.yaml
  core: !include pool-display/core.yaml


