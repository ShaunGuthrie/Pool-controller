esphome:
  name: p4-test
  friendly_name: test

esp32:
  variant: esp32p4
  engineering_sample: true
  framework:
    type: esp-idf
    version: 5.4.2
    advanced:
      enable_idf_experimental_features: true
  flash_size: 32MB
  cpu_frequency: 360MHz

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

psram:
  mode: hex
  speed: 200MHz

preferences:
  flash_write_interval: 5min

esp_ldo:
  - voltage: 2.5V
    channel: 3


logger:
  level: DEBUG

debug:

ota:
  platform: esphome

api:

captive_portal:
  
web_server:
  port: 80  

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  manual_ip:
    static_ip: !secret pool_ip
    gateway: !secret gateway
    subnet: !secret subnet

i2c:
  sda: GPIO07
  scl: GPIO08
  frequency: 400khz
  timeout: 10ms    

display:
  - platform: mipi_dsi
    id: main_display
    model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B
    reset_pin:
      number: 33
    update_interval: never
    auto_clear_enabled: false
   
    dimensions:
      width: 1024
      height: 600


