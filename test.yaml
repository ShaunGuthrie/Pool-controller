# --- Backlight ---
output:
  - platform: ledc
    pin: 
      number: GPIO32
      inverted: true
    id: backlight_pwm
    frequency: 5000 Hz
    

light:
  - platform: monochromatic
    output: backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

script:
  - id: backlight_off_timer
    mode: restart        # restart cancels previous run when executed again
    then:
      - delay: 120s
#      - light.turn_off: 
#          id: backlight

lvgl:
  buffer_size: 100%
  byte_order: little_endian
  displays:
    - main_display
#  touchscreens:
#    - touch
  
  pages:
    # ─────────────────────────────
    # Main page 
    # ─────────────────────────────
    - id: main_page
      bg_color: 0xFFFFFF 
      bg_opa: Cover
      pad_all: 0
      widgets:
        - label:
            align: center
            text: "you are not insane"
            text_color: 0x000000
