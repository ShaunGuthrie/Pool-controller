
sensor:

  # A0 - Water In

  - platform: ads1115
    ads1115_id: ads2
    multiplexer: A0_GND
    gain: 4.096
    id: temp_in_adc
    update_interval: never

  - platform: resistance
    id: temp_in_resistance
    sensor: temp_in_adc
    configuration: UPSTREAM
    resistor: 10kOhm

  - platform: ntc
    name: "Temp In"
    id: temp_in
    sensor: temp_in_resistance
    calibration:
      b_constant: 3950
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    filters:
    - offset: -1.7


  # A1 - Water Out

  - platform: ads1115
    ads1115_id: ads2
    multiplexer: A1_GND
    gain: 4.096
    id: temp_out_adc
    update_interval: never

  - platform: resistance
    id: temp_out_resistance
    sensor: temp_out_adc
    configuration: UPSTREAM
    resistor: 10kOhm

  - platform: ntc
    name: "Temp Out"
    id: temp_out
    sensor: temp_out_resistance
    calibration:
      b_constant: 3950
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    filters:
    - offset: -1.7      


  # A2 - Ambient

  - platform: ads1115
    ads1115_id: ads2
    multiplexer: A2_GND
    gain: 4.096
    id: ambient_adc
    update_interval: never

  - platform: resistance
    id: ambient_resistance
    sensor: ambient_adc
    configuration: UPSTREAM
    resistor: 10kOhm

  - platform: ntc
    name: "Temp Ambient"
    id: ambient
    sensor: ambient_resistance
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    filters:
      - offset: -4.4
      - lambda: return x * 9.0 / 5.0 + 32.0;    
    calibration:
      b_constant: 3950
      reference_temperature: 25°C
      reference_resistance: 10kOhm
 
     

switch:
  - platform: gpio
    pin: 
      xl9535: relays
      number: 0
      mode:
        output: true
      inverted: false 
    id: heater_relay
    restore_mode: always_off 
  - platform: gpio
    pin: 
      xl9535: relays
      number: 16
      mode:
        output: true
      inverted: false 
    id: heater_valve
    restore_mode: restore_default_off

climate:
  - platform: thermostat
    visual:
      min_temperature: 70 °F
      max_temperature: 100 °F
      temperature_step: 1 °F
    name: "Thermostat"
    id: pool_heater
    default_preset: start
    on_boot_restore_from: DEFAULT_PRESET
    heat_deadband: 2 °F
    preset:
      - name: start
        default_target_temperature_low: 88 °F
        mode: "Off"
    sensor: temp_in
    min_heating_off_time: 30s
    min_heating_run_time: 30s
    min_idle_time: 30s
    


      
    heat_mode:
      - switch.turn_on: heater_valve

    off_mode:  
      - switch.turn_off: heater_valve
      - lambda: |-
          // Restore pump to previously scheduled state
          if (id(Prev_Pump_Status) == "Low") {
          id(b_low).press();
          } else if (id(Prev_Pump_Status) == "High") {
          id(b_high).press();
          } else if (id(Prev_Pump_Status) == "Off") {
          id(b_off).press();
          }
          ESP_LOGI("heater", "Idle - Pump restored to scheduled state: %s", id(Prev_Pump_Status).c_str());


    heat_action:
      - lambda: |-
          // Remember current pump state before forcing High
          id(Prev_Pump_Status) = id(Pump_Status);
      - globals.set:
          id: heater_run
          value: '"Heat"'
      - globals.set:
          id: Pump_Status
          value: '"High"'
      - switch.turn_on: speed_high
      - switch.turn_on: heater_relay
    idle_action:
      - globals.set:
          id: heater_run
          value: '"Idle"'           
      - switch.turn_off: heater_relay          # turn off heater relay

      
interval:

  - interval: 10s
    then:
      - if:
          condition:
            lambda: |-
              return id(boot_complete);
          then:
            - component.update: temp_in_adc
            - component.update: temp_out_adc
            - component.update: ambient_adc
