  
interval:


  - interval: 10s
    then:
      - if:
          condition:
            lambda: |-
              return id(boot_complete);
          then:
            - component.update: ph_voltage
            - component.update: water_level_raw
            - component.update: orp_voltage
sensor:

  - platform: ads1115
    ads1115_id: ads1
    multiplexer: 'A0_GND'
    gain: "4.096"
    id: ph_voltage
    update_interval: never
    on_value:
      then:
        - component.update: ph_value
  - platform: ads1115
    ads1115_id: ads1
    multiplexer: 'A1_GND'
    gain: "4.096"
    id: orp_voltage
    update_interval: never
    on_value:
      then:
        - component.update: orp_value

  - platform: ads1115
    ads1115_id: ads1
    multiplexer: 'A2_GND'
    gain: "4.096"
    name: "Water Level raw"
    id: water_level_raw 
    update_interval: never
    on_value:
      then:
        - component.update: water_level_state
  - platform: template
    name: "Water Level State"
    id: water_level_state
    update_interval: never 
    lambda: |-
      float v = id(water_level_raw).state;

      if (v < 1.0) {
        return 0;
      } else if (v < 1.4) {
        return 1;
      } else if (v < 2.5) {
        return 2;
      } else {
        return 3;
      }

  - platform: template
    id: ph_value
    name: "pH Value"
    unit_of_measurement: "pH"
    icon: "mdi:flask-outline"
    update_interval: never
    lambda: |-
      // Get voltage from ads1115 sensor
      float V = id(ph_voltage).state;
      // Apply calibration formula
      return (-5.654 * V) + 15.509;

  - platform: template
    id: orp_value
    name: "ORP Value"
    unit_of_measurement: "mV"
    icon: "mdi:flask-outline"
    update_interval: never
    lambda: |-
      return (id(orp_voltage).state - 1.5) * 1000.0;


