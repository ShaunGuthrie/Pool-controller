script:

  - id: service_stop_action
    mode: restart
    then:
      - globals.set:
          id: saved_pump_status
          value: !lambda 'return id(Pump_Status);'
      - button.press: b_off    
      - logger.log: "SERVICE STOP pressed"

      - lambda: |-
          id(service_state) = "SERVICE";
          
          id(saved_heater_enabled) =
            (id(pool_heater).mode == climate::CLIMATE_MODE_HEAT);
          

      - switch.turn_off: super_chlorinate
      - switch.turn_off: chlor_power

      - climate.control:
          id: pool_heater
          mode: "OFF"

      - switch.turn_off: speed_high



  - id: service_run_action
    mode: restart
    then:
      - logger.log: "SERVICE RUN pressed"

      - lambda: |-
          if (id(service_state) != "SERVICE") {
            ESP_LOGW("service", "RUN ignored - not in service mode");
            return;
          }

          id(service_state) = "RUN";

      - switch.turn_on: speed_high

      - lambda: |-
          id(Pump_Status) = "High";

  - id: service_resume_action
    mode: restart        
    then:
      - logger.log: "SERVICE RESUME pressed"


      - lambda: |-
          // If RUN was active, stop pump first
          if (id(service_state) == "RUN") {
            id(b_off).press();
          }

          id(service_state) = "NORMAL";
   

      - if:
          condition:
            lambda: 'return id(saved_pump_status) == "Low";'
          then:
            - button.press: b_low

      - if:
          condition:
            lambda: 'return id(saved_pump_status) == "High";'
          then:
            - button.press: b_high

      - if:
          condition:
            lambda: 'return id(saved_pump_status) == "Off";'
          then:
            - button.press: b_off

      - if:
          condition:
            lambda: 'return id(saved_heater_enabled);'
          then:
            - climate.control:
                id: pool_heater
                mode: "HEAT"
binary_sensor:
  - platform: gpio
    name: "SERVICE STOP"
    id: stop
    pin:
      number: ${service_stop_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - script.execute: service_stop_action

  - platform: gpio
    name: "SERVICE RUN"
    id: service_run
    pin:
      number: ${service_run_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - script.execute: service_run_action

  - platform: gpio
    name: "RESUME"
    id: resume
    pin:
      number: ${service_resume_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - script.execute: service_resume_action

sensor:
  - platform: ads1115
    ads1115_id: ads1
    multiplexer: 'A3_GND'
    gain: 4.096
    name: "Filter Pressure raw"
    id: filter_pressure_raw
    unit_of_measurement: "V"
    accuracy_decimals: 1
    update_interval: never
    filters:
      - exponential_moving_average:
          alpha: 0.2
          send_every: 1
    on_value:
      then:
        - component.update: filter_pressure      
  - platform: template
    name: "Filter Pressure"
    id: filter_pressure
    unit_of_measurement: "PSI"
    accuracy_decimals: 1
    update_interval: never
    lambda: |-
      return id(filter_pressure_raw).state;     
    filters:
      - calibrate_linear:
          - 0.307 -> 0
          - 3.06 -> 30
                        

button:
  - platform: template
    name: "Pump Off"
    id: b_off
    on_press:
      then:
        - if:
            condition:
              lambda: |-
                return id(service_state) == "NORMAL";
            then: 
              - switch.turn_off: super_chlorinate
              - switch.turn_off: chlor_power
              - climate.control:
                  id: pool_heater
                  mode: "OFF"
              - globals.set:
                  id: Pump_Status
                  value: '"Off"'
              - switch.turn_off: speed_low
              - switch.turn_off: speed_med
              - switch.turn_off: speed_high    
              - globals.set:
                  id: Prev_Pump_Status
                  value: '"Off"'
  
  - platform: template
    name: "Pump Low"
    id: b_low
    on_press:
      then:
        - if:
            condition:
              lambda: |-
                return id(service_state) == "NORMAL";
            then:
              - switch.turn_on: speed_low    
              - globals.set:
                  id: Prev_Pump_Status
                  value: '"Low"'
              - component.update: ha_desired_speed  
              - switch.turn_on: chlor_power    

  - platform: template
    name: "Pump Medium"
    id: b_med
    internal: true
    on_press:
      then:
        - if:
            condition:
              lambda: |-
                return id(service_state) == "NORMAL";
            then:
              # PLACEHOLDER: 3-speed pump not installed yet - intentionally drives
              # the speed_high relay until the real medium-speed relay exists.
              - switch.turn_on: speed_high
              - globals.set:
                  id: Prev_Pump_Status
                  value: '"High"'  # fix this on 3 speed install
              - component.update: ha_desired_speed      
  - platform: template
    name: "Pump High"
    id: b_high
    on_press:
      then:
        - if:
            condition:
              lambda: |-
                return id(service_state) == "NORMAL";
            then:
              - switch.turn_on: speed_high
              - globals.set:
                  id: Prev_Pump_Status
                  value: '"High"'
              - component.update: ha_desired_speed    
              - switch.turn_on: chlor_power            

switch:
  - platform: gpio
    pin:
      xl9535: relays
      number: 1
      mode:
        output: true
      inverted: false 
    id: speed_low
    interlock: &interlock_group 
      - speed_low
      - speed_med
      - speed_high 
    interlock_wait_time: 1s
    restore_mode: restore_default_off
    on_turn_on:
      - globals.set:
          id: Pump_Status
          value: '"Low"'
      - component.update: ha_pump_status

    on_turn_off:  
      - component.update: ha_pump_status

  - platform: gpio
    pin: 
      xl9535: relays
      number: 2
      mode:
        output: true
      inverted: false 
    id: speed_med
    interlock: *interlock_group
    interlock_wait_time: 1s
    restore_mode: always_off
    internal: true
    on_turn_on:
      - globals.set:
          id: Pump_Status
          value: '"Med"'      
      - component.update: ha_pump_status

    on_turn_off:  
      - component.update: ha_pump_status


  - platform: gpio
    pin: 
      xl9535: relays
      number: 3
      mode:
        output: true
      inverted: false 
    id: speed_high
    interlock: *interlock_group
    interlock_wait_time: 1s
    restore_mode: restore_default_off
    on_turn_on:
      - globals.set:
          id: Pump_Status
          value: '"High"'
      - component.update: ha_pump_status

    on_turn_off:  
      - component.update: ha_pump_status
    

  - platform: gpio
    pin: 
      xl9535: relays
      number: 17
      mode:
        output: true
      inverted: false 
    id: fountain_valve
    name: "Fountain"
    restore_mode: restore_default_off

  - platform: gpio
    pin: 
      xl9535: relays
      number: 7
      mode:
        output: true
      inverted: false 
    id: fountain_pause
    name: "Fountain Pause"
    restore_mode: restore_default_off




text_sensor:  # can we make this update on chenge of status
  - platform: template
    name: HA Pump Status
    id: ha_pump_status
    lambda: |-
      return { id(Pump_Status) };
    update_interval: never  
  - platform: template
    name: HA Desired Speed
    id: ha_desired_speed
    lambda: |-
      return { id(Prev_Pump_Status) };
    update_interval: never

number:
  - platform: template
    name: "Low Speed Filter Baseline PSI"
    id: low_run
    min_value: 0.0
    max_value: 20.0
    step: 0.1
    restore_value: true
    optimistic: true
    unit_of_measurement: "PSI"

  - platform: template
    name: "Med Speed Filter Baseline PSI"
    id: med_run
    min_value: 0.0
    max_value: 20.0
    step: 0.1
    restore_value: true
    optimistic: true
    unit_of_measurement: "PSI"

  - platform: template
    name: "High Speed Filter Baseline PSI"
    id: high_run
    min_value: 0.0
    max_value: 20.0
    step: 0.1
    restore_value: true
    optimistic: true
    unit_of_measurement: "PSI"

interval:


  - interval: 10s
    then:
      - if:
          condition:
            lambda: |-
              return id(boot_complete);
          then:
            - component.update: filter_pressure_raw    