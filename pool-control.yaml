esphome:
  name: pool-controller
  friendly_name: Pool Controller
  platformio_options:
    # Forces board to properly initialize 16MB flash and 8MB PSRAM
    board_build.flash_mode: opi
    board_build.psram_type: opi
    board_build.extra_flags:
      - -DCONFIG_SPIRAM_MODE_OCT
      - -DARDUINO_USB_CDC_ON_BOOT=1
      - -DBOARD_HAS_PSRAM=11      
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            esp_reset_reason_t reason = esp_reset_reason();
            switch(reason) {
              case ESP_RST_POWERON:   ESP_LOGI("boot", "Reset: Power on"); break;
              case ESP_RST_BROWNOUT:  ESP_LOGE("boot", "Reset: BROWNOUT"); break;
              case ESP_RST_WDT:       ESP_LOGE("boot", "Reset: Watchdog"); break;
              case ESP_RST_PANIC:     ESP_LOGE("boot", "Reset: Panic/crash"); break;
              case ESP_RST_SW:        ESP_LOGI("boot", "Reset: Software"); break;
              default:               ESP_LOGW("boot", "Reset: Unknown (%d)", reason); break;
            }
    - priority: -100
      then:
        - delay: 2s
        - lambda: id(boot_complete) = true;
        - wait_until:
            api.connected:
        - component.update: ha_pump_status
        - component.update: ha_desired_speed    
        - lambda: |-
            esp_log_level_set("*", ESP_LOG_INFO);
            ESP_LOGI("boot", "Log level set to INFO");


esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB       # <-- This line triggers the auto-partitioning
  framework:
    type: esp-idf
#  partitions: partitions_s3.csv

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  manual_ip:
    static_ip: !secret pool_control_ip
    gateway: !secret gateway
    subnet: !secret subnet

api:
  reboot_timeout: 2min

ota:
  platform: esphome

safe_mode:
  num_attempts: 3
  reboot_timeout: 60s
  boot_is_good_after: 60s

logger:
  level: VERBOSE
  initial_level: INFO

syslog:
  port: 1514
  strip: true

time:
  - platform: homeassistant
    id: pool_time  

web_server:
  port: 80  

udp:
  addresses:
    - 192.168.13.6

packages:
  globals: !include pool-control/globals.yaml
  hardware: !include pool-control/hardware.yaml
  pump: !include pool-control/pump.yaml
  heater: !include pool-control/heater.yaml
  chlorinator: !include pool-control/chlorinator.yaml
  chemistry: !include pool-control/chemistry.yaml
  acid_dose: !include pool-control/acid_dose.yaml
  schedule: !include pool-control/schedule.yaml

select:
  - platform: logger
    name: "Log Level"
    on_value:
      then:
        - logger.log:
            level: INFO
            format: "Log level was manually updated to: %s"
            args: [ 'x.c_str()' ]
